name: Release
on: push

env:
  packageName: "com.nekometer.esnya.udon-sun-controller"

permissions:
  contents: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
      - run: npm ci

      - id: prev_version
        uses: notiz-dev/github-action-json-property@a5a9c668b16513c737c3e1f8956772c99c73f6e8
        with:
            path: "Packages/${{env.packageName}}/package.json"
            prop_path: "version"

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        uses: notiz-dev/github-action-json-property@a5a9c668b16513c737c3e1f8956772c99c73f6e8
        with:
            path: "Packages/${{env.packageName}}/package.json"
            prop_path: "version"
    outputs:
      prev_version: ${{ steps.prev_version.outputs.prop }}
      next_version: ${{ steps.version.outputs.prop }}

  vcc-release:
    runs-on: ubuntu-latest
    needs: semantic-release
    if: needs.semantic-release.outputs.prev_version != needs.semantic-release.outputs.next_version
    steps:
      - uses: actions/checkout@v6
      - run: echo "version=${{ needs.semantic-release.outputs.next_version }}" >> $GITHUB_ENV

      - run: |
          echo "zipFile=${{ env.packageName }}-${{ env.version }}".zip >> $GITHUB_ENV
          echo "unityPackage=${{ env.packageName }}-${{ env.version }}.unitypackage" >> $GITHUB_ENV
      - uses: thedoctor0/zip-release@b57d897cb5d60cb78b51a507f63fa184cfe35554
        with:
          type: "zip"
          directory: "Packages/${{env.packageName}}/"
          filename: "../../${{env.zipFile}}" # make the zip file two directories up, since we start two directories in above

      - run: find "Packages/${{env.packageName}}/" -name \*.meta >> metaList
      - uses: pCYSl5EDgo/create-unitypackage@b5c57408698b1fab8b3a84d4b67f767b8b7c0be9
        with:
          package-path: ${{ env.unityPackage }}
          include-files: metaList

      - uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de
        with:
          tag: v${{ env.version }}
          file: ${{ env.zipFile }}
      - uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de
        with:
          tag: v${{ env.version }}
          file: ${{ env.unityPackage }}
      - uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de
        with:
          tag: v${{ env.version }}
          file: Packages/${{ env.packageName }}/package.json
      - run: |
          TOKEN=${{ secrets.VCC_PACKAGES_TOKEN }}
          OWNER=esnya
          REPO=vcc-packages

          curl \
            -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$OWNER/$REPO/dispatches \
            -d '{"event_type":"build-listing","client_payload":{}}'
